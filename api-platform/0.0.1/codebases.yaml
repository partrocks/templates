codebases:
  api:
    path: ./apps/api
    build:
      baseImage: php:8.4-cli-bookworm
      dependencies:
        - composer
      steps:
        - id: scaffold-symfony-skeleton
          run: composer create-project symfony/skeleton . --no-interaction
        - id: scaffold-gitignore
          copy:
            from: api/.gitignore
            to: .gitignore

        # Non Auth Artifacts
        - id: copy-composer-manifest
          copy:
            from: api/composer.json
            to: composer.json
          when: options.addAuth == false

        # Auth Artifacts
        - id: copy-composer-auth-manifest
          copy:
            from: api/auth/composer.json
            to: composer.json
          when: options.addAuth == true
        - id: copy-phpunit-auth
          copy:
            from: api/auth/phpunit.xml.dist
            to: phpunit.xml.dist
          when: options.addAuth == true

        # Install Dependencies
        - id: install
          run: rm -f composer.lock symfony.lock && rm -rf vendor && composer install --no-interaction --prefer-dist
        - id: composer-rehydrate
          run: composer install --no-interaction --prefer-dist
          skipOnImport: false
        - id: permissions
          run: chmod +x bin/console
          skipOnImport: false

        # Auth Config
        - id: copy-configpackages-yaml-auth
          merge:
            from: api/auth/config/packages
            to: config/packages
          when: options.addAuth == true
        - id: copy-config-routes-yaml-auth
          merge:
            from: api/auth/config/routes
            to: config/routes
          when: options.addAuth == true
        - id: copy-config-bundles-php-auth
          copy:
            from: api/auth/config/bundles.php
            to: config/bundles.php
          when: options.addAuth == true
        - id: copy-config-reference-php-auth
          copy:
            from: api/auth/config/reference.php
            to: config/reference.php
          when: options.addAuth == true
        - id: copy-migrations-auth
          merge:
            from: api/auth/migrations
            to: migrations
          when: options.addAuth == true
        - id: copy-templates-auth
          merge:
            from: api/auth/templates
            to: templates
          when: options.addAuth == true
        - id: copy-tests-auth
          merge:
            from: api/auth/tests
            to: tests
          when: options.addAuth == true
        - id: copy-src-auth
          merge:
            from: api/auth/src
            to: src
          when: options.addAuth == true

        # Cache warmup
        - id: cache-warmup
          run: php bin/console cache:warmup --env=dev --no-interaction
          skipOnImport: false
      workingPath: /app
      outputPath: /app

codebases:
  api:
    path: ./apps/api
    build:
      baseImage: php:8.4-cli-bookworm
      dependencies:
        - composer
      steps:
        - id: scaffold-symfony-skeleton
          run: composer create-project symfony/skeleton . --no-interaction
        - id: scaffold-gitignore
          copy:
            from: api/.gitignore
            to: .gitignore
        - id: copy-composer-manifest
          copy:
            from: api/composer.json
            to: composer.json
        - id: install
          run: rm -f composer.lock symfony.lock && rm -rf vendor && composer install --no-interaction --prefer-dist
        - id: composer-rehydrate
          run: composer install --no-interaction --prefer-dist
          skipOnImport: false
        - id: permissions
          run: chmod +x bin/console
          skipOnImport: false

        # Copy the API Platform code from the template

        - id: cache-warmup
          run: php bin/console cache:warmup --env=dev --no-interaction
          skipOnImport: false
      workingPath: /app
      outputPath: /app

codebases:
  api:
    path: ./apps/api
    build:
      baseImage: php:8.4-cli-bookworm
      dependencies:
        - composer
      steps:
        scaffold-symfony-skeleton:
          run: composer create-project symfony/skeleton . --no-interaction
        add-gitignore:
          copy:
            from: api/.gitignore
            to: .gitignore

        # Non-auth baseline artifacts.
        composer-manifest:
          copy:
            from: api/composer.json
            to: composer.json

        # Install dependencies.
        composer-install:
          run: rm -f composer.lock symfony.lock && rm -rf vendor && (composer install --no-interaction --prefer-dist || composer install --no-interaction --prefer-dist)
        composer-rehydrate:
          run: composer install --no-interaction --prefer-dist
          skipOnImport: false
        permissions:
          run: chmod +x bin/console
          skipOnImport: false

        # Non-auth source defaults.
        merge-src-noauth-fixtures:
          merge:
            from: api/noauth/src
            to: src

        # Cache warmup.
        cache-warmup:
          run: php bin/console cache:warmup --env=dev --no-interaction
          skipOnImport: false
      stepOrder:
        - scaffold-symfony-skeleton
        - add-gitignore
        - composer-manifest
        - composer-install
        - composer-rehydrate
        - permissions
        - merge-src-noauth-fixtures
        - cache-warmup
      workingPath: /app
      outputPath: /app

when@withAuth:
  codebases:
    api:
      build:
        steps:
          copy-composer-auth-manifest:
            copy:
              from: api/auth/composer.json
              to: composer.json
          copy-phpunit-auth:
            copy:
              from: api/auth/phpunit.dist.xml
              to: phpunit.xml.dist
          copy-configpackages-yaml-auth:
            merge:
              from: api/auth/config/packages
              to: config/packages
              overwrite: true
          copy-config-routes-yaml-auth:
            merge:
              from: api/auth/config/routes
              to: config/routes
              overwrite: true
          copy-config-bundles-php-auth:
            copy:
              from: api/auth/config/bundles.php
              to: config/bundles.php
          copy-config-reference-php-auth:
            copy:
              from: api/auth/config/reference.php
              to: config/reference.php
          copy-migrations-auth:
            merge:
              from: api/auth/migrations
              to: migrations
              overwrite: true
          copy-templates-auth:
            merge:
              from: api/auth/templates
              to: templates
              overwrite: true
              substituteDelimiters: ["[[", "]]"]
          copy-tests-auth:
            merge:
              from: api/auth/tests
              to: tests
              overwrite: true
          copy-src-auth:
            merge:
              from: api/auth/src
              to: src
              overwrite: true
        stepOrder:
          - scaffold-symfony-skeleton
          - add-gitignore
          - copy-composer-auth-manifest
          - copy-phpunit-auth
          - composer-install
          - composer-rehydrate
          - permissions
          - copy-configpackages-yaml-auth
          - copy-config-routes-yaml-auth
          - copy-config-bundles-php-auth
          - copy-config-reference-php-auth
          - copy-migrations-auth
          - copy-templates-auth
          - copy-tests-auth
          - copy-src-auth
          - cache-warmup

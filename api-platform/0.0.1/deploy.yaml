# ---------------------------------------------------------------------------
# environments — cloud topology (EC2 + Postgres).
# ---------------------------------------------------------------------------
environments:
  cloud:
    slots:
      # Non-hosting slot: Postgres. Exposes `connectionString` output
      # consumed by the api hosting slot. No codebaseId, no env.
      primary-db:
        type: database
        allowed:
          - aws::database::postgres

      # API host — EC2 single-instance. Attaches to the database so
      # deploy order is primary-db → api-host. DATABASE_URL is the
      # env var the user explicitly asked for.
      api-host:
        type: hosting
        codebaseId: api
        allowed:
          - aws::hosting::ec2-single
        attachesTo:
          - primary-db
        env:
          - name: APP_ENV
            value: prod
          - name: APP_NAME
            value: "{{ app.name }}"
          - name: DATABASE_URL
            from:
              slot: primary-db
              output: connectionString
          - name: APP_SECRET
            fromSecret: api_app_secret
          - name: MAILER_DSN
            fromSecret: api_mailer_dsn

when@withAuth:
  environments:
    cloud:
      slots:
        api-host:
          env:
            - name: JWT_SECRET_KEY
              fromSecret: api_jwt_secret
            - name: JWT_ACCESS_TTL
              value: "3600"
            - name: JWT_REFRESH_TTL
              value: "604800"
            - name: AUTH_LOGIN_LIMIT
              value: "30"
            - name: AUTH_REGISTER_LIMIT
              value: "10"
            - name: AUTH_RESET_REQUEST_LIMIT
              value: "5"
            - name: AUTH_LOGIN_LOCK_THRESHOLD
              value: "5"
            - name: AUTH_LOGIN_LOCK_MINUTES
              value: "15"
            - name: APP_FRONTEND_RESET_URL
              value: "{{ vars.passwordResetPageUrl }}"
            - name: CORS_ALLOW_ORIGIN
              value: "^$"

environments:
  develop:
    type: docker
    services:
      db:
        image: postgres:16
        ports:
          db:
            container: 5432
            host: auto
        readiness:
          port: 5432
        mounts:
          - source: ./data/postgres
            target: /var/lib/postgresql/data
        environment:
          - name: POSTGRES_USER
            value: "{{ options.databaseUser }}"
          - name: POSTGRES_PASSWORD
            value: "{{ options.databasePassword }}"
          - name: POSTGRES_DB
            value: "{{ options.databaseName }}"

      mailpit:
        when: options.withAuth
        image: axllent/mailpit:latest
        ports:
          smtp:
            container: 1025
            host: auto
          ui:
            container: 8025
            host: auto
        readiness:
          port: 1025
        environment:
          - name: MP_SMTP_AUTH_ACCEPT_ANY
            value: "1"
          - name: MP_SMTP_AUTH_ALLOW_INSECURE
            value: "1"

      api:
        codebaseId: api
        image: partrocks/nextjs-symfony-postgres-api:dev
        imageBuild:
          dockerfile: docker/api/Dockerfile
        ports:
          http:
            container: 8000
            host: auto
        dependsOn:
          - db
          - mailpit
        entrypoint: "php -S 0.0.0.0:{{ services.api.ports.http.container }} -t public"
        environment:
          - name: APP_ENV
            value: dev
          - name: APP_NAME
            value: "{{ app.name }}"
          - name: DATABASE_URL
            value: "postgresql://{{ options.databaseUser }}:{{ options.databasePassword }}@{{ services.db.hostname }}:{{ services.db.ports.db.container }}/{{ options.databaseName }}?serverVersion=16&charset=utf8"
          - name: MAILER_DSN
            value: "smtp://{{ services.mailpit.hostname }}:{{ services.mailpit.ports.smtp.container }}"
        actions:
          clear-cache:
            label: Clear cache
            run: "php bin/console cache:clear"
          load-fixtures:
            label: Load fixtures
            run: "php bin/console doctrine:fixtures:load --no-interaction"
          make-migrations:
            label: Generate migration (diff)
            run: "php bin/console doctrine:migrations:diff --no-interaction"
          migrate:
            label: Migrate database
            run: "php bin/console doctrine:migrations:migrate --no-interaction --allow-no-migration"
        boot:
          - migrate
          - load-fixtures
          - clear-cache

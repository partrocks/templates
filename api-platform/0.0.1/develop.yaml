environments:
  develop:
    type: docker
    services:
      db:
        image: postgres:16
        ports:
          db:
            container: 5432
            host: auto
        readiness:
          port: 5432
        mounts:
          - source: ./data/postgres
            target: /var/lib/postgresql/data
        environment:
          - name: POSTGRES_USER
            value: "{{ vars.databaseUser }}"
          - name: POSTGRES_PASSWORD
            value: "{{ vars.databasePassword }}"
          - name: POSTGRES_DB
            value: "{{ vars.databaseName }}"

      api:
        codebaseId: api
        image: partrocks/nextjs-symfony-postgres-api:dev
        imageBuild:
          dockerfile: docker/api/Dockerfile
        ports:
          http:
            container: 8000
            host: auto
        dependsOn:
          - db
        entrypoint: "php -S 0.0.0.0:{{ services.api.ports.http.container }} -t public"
        environment:
          - name: APP_ENV
            value: dev
          - name: APP_NAME
            value: "{{ app.name }}"
          - name: DATABASE_URL
            value: "postgresql://{{ vars.databaseUser }}:{{ vars.databasePassword }}@{{ services.db.hostname }}:{{ services.db.ports.db.container }}/{{ vars.databaseName }}?serverVersion=16&charset=utf8"
          - name: APP_FIXTURE_ADMIN_EMAIL
            value: "admin@example.com"
          - name: APP_FIXTURE_ADMIN_PASSWORD
            value: "password"
        actions:
          clear-cache:
            label: Clear cache
            run: "php bin/console cache:clear"
          load-fixtures:
            label: Load fixtures
            run: "php bin/console doctrine:fixtures:load --no-interaction"
          make-migrations:
            label: Generate migration (diff)
            run: "php bin/console doctrine:migrations:diff --no-interaction"
          migrate:
            label: Migrate database
            run: "php bin/console doctrine:migrations:migrate --no-interaction --allow-no-migration"
        boot:
          - migrate
          - load-fixtures
          - clear-cache

when@withAuth:
  environments:
    develop:
      services:
        mailpit:
          image: axllent/mailpit:latest
          ports:
            smtp:
              container: 1025
              host: auto
            ui:
              container: 8025
              host: auto
          readiness:
            port: 1025
          environment:
            - name: MP_SMTP_AUTH_ACCEPT_ANY
              value: "1"
            - name: MP_SMTP_AUTH_ALLOW_INSECURE
              value: "1"
        api:
          dependsOn:
            - mailpit
          environment:
            - name: JWT_SECRET_KEY
              value: >-
                dev-only-insecure-hmac-secret-min-32-chars-do-not-reuse-in-prod
            - name: JWT_ACCESS_TTL
              value: "3600"
            - name: JWT_REFRESH_TTL
              value: "604800"
            - name: AUTH_LOGIN_LIMIT
              value: "30"
            - name: AUTH_REGISTER_LIMIT
              value: "10"
            - name: AUTH_RESET_REQUEST_LIMIT
              value: "5"
            - name: AUTH_LOGIN_LOCK_THRESHOLD
              value: "5"
            - name: AUTH_LOGIN_LOCK_MINUTES
              value: "15"
            - name: MAILER_DSN
              value: "smtp://{{ services.mailpit.hostname }}:{{ services.mailpit.ports.smtp.container }}"
            - name: MAILER_FROM
              value: "noreply@{{ app.name }}.dev"
            - name: APP_FRONTEND_RESET_URL
              value: "{{ vars.passwordResetPageUrl }}"

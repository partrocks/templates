vars:
  databaseName:
    id: databaseName
    label: Postgres database name
    type: string
    required: false
    default: app

  withAuth:
    id: withAuth
    label: Add Auth Server?
    type: boolean
    required: true
    default: false

  withDashboard:
    id: withDashboard
    label: Add Frontend Dashboard?
    type: boolean
    required: true
    default: false
    visibleWhen: vars.withAuth == true

  adminEmail:
    id: adminEmail
    label: Admin email
    type: string
    required: true
    visibleWhen: vars.withAuth == true
    default: "admin@example.com"

  adminPassword:
    id: adminPassword
    label: Admin password
    type: string
    required: true
    visibleWhen: vars.withAuth == true
    default: "passwordpassword"

  databaseUser:
    id: databaseUser
    label: Postgres user (develop only)
    type: string
    required: false
    default: app
    hidden: true

  databasePassword:
    id: databasePassword
    label: Postgres password (develop only)
    type: string
    required: false
    default: app
    hidden: true

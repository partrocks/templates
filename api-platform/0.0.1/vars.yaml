vars:
  databaseName:
    id: databaseName
    label: Postgres database name
    type: string
    required: false
    default: app

  withAuth:
    id: withAuth
    label: Use JWT Authentication?
    type: boolean
    required: true
    default: false

  passwordResetPageUrl:
    id: passwordResetPageUrl
    label: Redirect URL after password reset
    type: string
    required: false
    default: "http://localhost:3000/auth/reset-password"

  adminEmail:
    id: adminEmail
    label: Admin email
    type: string
    required: false
    default: "admin@example.com"

  adminPassword:
    id: adminPassword
    label: Admin password
    type: string
    required: false
    default: "password"

  databaseUser:
    id: databaseUser
    label: Postgres user (develop only)
    type: string
    required: false
    default: app
    hidden: true

  databasePassword:
    id: databasePassword
    label: Postgres password (develop only)
    type: string
    required: false
    default: app
    hidden: true

# ---------------------------------------------------------------------------
# codebases — two: a Next.js frontend (web) and a Symfony API (api).
#
# `copy.from` is relative to the template's `resources/` directory (no
# `resources/` prefix). `copy.to` is relative to the container workspace
# root (default `/app`). `workingPath` / `outputPath` default to `/app`;
# `outputPath` is only set below when a codebase emits a narrower artifact.
#
# Steps with `skipOnImport: false` run again after manifest import clones the
# repo (typical installs). All steps still run in order on bootstrap.
# ---------------------------------------------------------------------------
codebases:
  web:
    path: ./apps/web
    build:
      baseImage: node:20-bookworm
      dependencies:
        - npm
      steps:
        scaffold-package-json:
          copy:
            from: web/package.json
            to: package.json
        scaffold-next-config:
          copy:
            from: web/next.config.mjs
            to: next.config.mjs
        scaffold-tsconfig:
          copy:
            from: web/tsconfig.json
            to: tsconfig.json
        # Use [[ ]] delimiters so default {{ }} scanning does not interact with
        # JSX (e.g. style={{ ... }}). Substitutions are unused in these files today.
        scaffold-layout:
          copy:
            from: web/app/layout.tsx
            to: app/layout.tsx
            substituteDelimiters: ["[[", "]]"]
        scaffold-page:
          copy:
            from: web/app/page.tsx
            to: app/page.tsx
            substituteDelimiters: ["[[", "]]"]
        scaffold-gitignore:
          copy:
            from: web/.gitignore
            to: .gitignore
        install:
          run: npm install
          skipOnImport: false
        build:
          run: npm run build
      stepOrder:
        - scaffold-package-json
        - scaffold-next-config
        - scaffold-tsconfig
        - scaffold-layout
        - scaffold-page
        - scaffold-gitignore
        - install
        - build
      # Artifact lives under `/app/.next`; narrow the default workspace output.
      outputPath: /app/.next

  api:
    path: ./apps/api
    build:
      baseImage: php:8.3-cli-bookworm
      dependencies:
        - composer
      steps:
        scaffold-symfony-skeleton:
          run: composer create-project symfony/skeleton . --no-interaction
        scaffold-gitignore:
          copy:
            from: api/.gitignore
            to: .gitignore
        copy-composer-manifest:
          copy:
            from: api/composer.json
            to: composer.json
        install:
          run: rm -f composer.lock symfony.lock && rm -rf vendor && composer install --no-interaction --prefer-dist
        composer-rehydrate:
          run: composer install --no-interaction --prefer-dist
          skipOnImport: false
        permissions:
          run: chmod +x bin/console
          skipOnImport: false
        copy-landing-controller:
          copy:
            from: api/src/Controller/LandingController.php
            to: src/Controller/LandingController.php
        copy-quote-entity:
          copy:
            from: api/src/Entity/Quote.php
            to: src/Entity/Quote.php
        copy-migration:
          copy:
            from: api/migrations/Version20260503142737.php
            to: migrations/Version20260503142737.php
        copy-app-fixtures:
          copy:
            from: api/src/DataFixtures/AppFixtures.php
            to: src/DataFixtures/AppFixtures.php
        copy-landing-twig:
          copy:
            from: api/templates/landing.html.twig
            to: templates/landing.html.twig
            substituteDelimiters: ["[[", "]]"]
        cache-warmup:
          run: php bin/console cache:warmup --env=dev --no-interaction
          skipOnImport: false
      stepOrder:
        - scaffold-symfony-skeleton
        - scaffold-gitignore
        - copy-composer-manifest
        - install
        - composer-rehydrate
        - permissions
        - copy-landing-controller
        - copy-quote-entity
        - copy-migration
        - copy-app-fixtures
        - copy-landing-twig
        - cache-warmup
      workingPath: /app
      outputPath: /app

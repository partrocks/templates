# ---------------------------------------------------------------------------
# codebases — two: a Next.js frontend (web) and a Symfony API (api).
#
# `copy.from` is relative to the template's `resources/` directory (no
# `resources/` prefix). `copy.to` is relative to the container workspace
# root (default `/app`). `workingPath` / `outputPath` default to `/app`;
# `outputPath` is only set below when a codebase emits a narrower artifact.
# ---------------------------------------------------------------------------
codebases:
  web:
    path: ./apps/web
    build:
      baseImage: node:20-bookworm
      dependencies:
        - npm
      steps:
        - id: scaffold-package-json
          copy:
            from: web/package.json
            to: package.json
        - id: scaffold-next-config
          copy:
            from: web/next.config.mjs
            to: next.config.mjs
        - id: scaffold-tsconfig
          copy:
            from: web/tsconfig.json
            to: tsconfig.json
        - id: scaffold-layout
          copy:
            from: web/app/layout.tsx
            to: app/layout.tsx
        - id: scaffold-page
          copy:
            from: web/app/page.tsx
            to: app/page.tsx
        - id: scaffold-gitignore
          copy:
            from: web/.gitignore
            to: .gitignore
        - id: install
          run: npm install
        - id: build
          run: npm run build
      # Artifact lives under `/app/.next`; narrow the default workspace output.
      outputPath: /app/.next

  api:
    path: ./apps/api
    build:
      baseImage: php:8.3-cli-bookworm
      dependencies:
        - composer
      steps:
        - id: scaffold-symfony-skeleton
          run: composer create-project symfony/skeleton . --no-interaction
        - id: scaffold-gitignore
          copy:
            from: api/.gitignore
            to: .gitignore
        - id: copy-composer-manifest
          copy:
            from: api/composer.json
            to: composer.json
        - id: install
          run: rm -f composer.lock symfony.lock && rm -rf vendor && composer install --no-interaction --prefer-dist
        - id: permissions
          run: chmod +x bin/console
        - id: copy-controllers
          copy:
            from: api/src/Controller
            to: src/Controller
        - id: copy-entities
          copy:
            from: api/src/Entity
            to: src/Entity
        - id: copy-fixtures
          copy:
            from: api/src/DataFixtures
            to: src/DataFixtures
        - id: copy-twig-templates
          copy:
            from: api/templates
            to: templates
        - id: make-migrations
          run: php bin/console make:migration
        - id: migrate
          run: php bin/console doctrine:migrations:migrate --no-interaction
        - id: load-fixtures
          run: php bin/console doctrine:fixtures:load --no-interaction
        - id: cache-warmup
          run: php bin/console cache:warmup --env=dev --no-interaction
      workingPath: /app
      outputPath: /app

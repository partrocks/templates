# ---------------------------------------------------------------------------
# environments — develop (Docker).
#
# Develop services are keyed by service key (also used as the Docker
# network alias). `codebaseId` binds a service to a codebase — when set,
# the launcher mounts the codebase root at `/app` rw and sets the
# container working directory to `/app`. Ports are named maps with a stable
# port id, required container port, and optional host port. Omit `host` or set
# it to `auto` to publish from the active profile's develop port range.
# `dependsOn` waits until the dependency's TCP readiness probe succeeds before
# starting a service.
# ---------------------------------------------------------------------------
environments:
  develop:
    type: docker
    services:
      db:
        image: postgres:16
        ports:
          db:
            container: 5432
            host: auto
        readiness:
          port: 5432
        mounts:
          # Postgres data volume — kept outside ./apps so it never
          # overlaps a codebase path.
          - source: ./data/postgres
            target: /var/lib/postgresql/data
        environment:
          - name: POSTGRES_USER
            value: "{{ vars.databaseUser }}"
          - name: POSTGRES_PASSWORD
            value: "{{ vars.databasePassword }}"
          - name: POSTGRES_DB
            value: "{{ vars.databaseName }}"

      api:
        codebaseId: api
        image: partrocks/nextjs-symfony-postgres-api:dev
        imageBuild:
          dockerfile: docker/api/Dockerfile
        ports:
          http:
            container: 8000
            host: auto
        dependsOn:
          - db
        entrypoint: "php -S 0.0.0.0:{{ services.api.ports.http.container }} -t public"
        environment:
          - name: APP_ENV
            value: dev
          - name: APP_NAME
            value: "{{ app.name }}"
          - name: DATABASE_URL
            value: "postgresql://{{ vars.databaseUser }}:{{ vars.databasePassword }}@{{ services.db.hostname }}:{{ services.db.ports.db.container }}/{{ vars.databaseName }}?serverVersion=16&charset=utf8"
        actions:
          clear-cache:
            label: Clear cache
            run: "php bin/console cache:clear"
          load-fixtures:
            label: Load fixtures
            run: "php bin/console doctrine:fixtures:load --no-interaction"
          make-migrations:
            label: Generate migration (diff)
            run: "php bin/console doctrine:migrations:diff --no-interaction"
          migrate:
            label: Migrate database
            run: "php bin/console doctrine:migrations:migrate --no-interaction --allow-no-migration"
        boot:
          - migrate
          - load-fixtures
          - clear-cache

      web:
        codebaseId: web
        image: node:20-bookworm
        ports:
          http:
            container: 3000
            host: auto
        # Explicit on both `api` and `db` even though `api` already
        # waits on `db` — keeps `web`'s dependencies self-documenting
        # and guarantees readiness order if the graph is ever edited.
        dependsOn:
          - api
          - db
        command: "npm install"
        entrypoint: "npm run dev"
        environment:
          - name: NODE_ENV
            value: development
          # The web app only talks to the API over HTTP — it does
          # NOT hold DATABASE_URL. Postgres is shared via the API.
          - name: NEXT_PUBLIC_API_URL
            value: "http://{{ services.api.hostname }}:{{ services.api.ports.http.container }}"
          - name: APP_NAME
            value: "{{ app.name }}"

schemaVersion: 2

manifest:
    id: nextjs-symfony-postgres
    name: Next.js + Symfony API Platform + Postgres
    version: "0.1.0"
    description: >-
        Next.js web frontend plus a PHP Symfony / API Platform API sharing a
        Postgres database. Both apps host on EC2; develop runs in Docker.

# ---------------------------------------------------------------------------
# Options — caller-tunable knobs. Only {{ options.* }} substitution is
# supported anywhere in this file.
# ---------------------------------------------------------------------------
options:
    projectSlug:
        id: projectSlug
        label: Project slug
        type: string
        required: true
        default: my-app

    databaseName:
        id: databaseName
        label: Postgres database name
        type: string
        required: false
        default: app

    databaseUser:
        id: databaseUser
        label: Postgres user (develop only)
        type: string
        required: false
        default: app

    databasePassword:
        id: databasePassword
        label: Postgres password (develop only)
        type: string
        required: false
        default: app

# ---------------------------------------------------------------------------
# codebases — two: a Next.js frontend (web) and a Symfony API (api).
#
# `copy.from` is relative to the template's `resources/` directory (no
# `resources/` prefix). `copy.to` is relative to the container workspace
# root (default `/app`). `workingPath` / `outputPath` default to `/app`;
# `outputPath` is only set below when a codebase emits a narrower artifact.
# ---------------------------------------------------------------------------
codebases:
    web:
        path: ./apps/web
        build:
            baseImage: node:20-bookworm
            dependencies:
                - npm
            steps:
                - id: scaffold-package-json
                  copy:
                      from: web/package.json
                      to: package.json
                - id: scaffold-next-config
                  copy:
                      from: web/next.config.mjs
                      to: next.config.mjs
                - id: scaffold-tsconfig
                  copy:
                      from: web/tsconfig.json
                      to: tsconfig.json
                - id: scaffold-layout
                  copy:
                      from: web/app/layout.tsx
                      to: app/layout.tsx
                - id: scaffold-page
                  copy:
                      from: web/app/page.tsx
                      to: app/page.tsx
                - id: scaffold-gitignore
                  copy:
                      from: web/.gitignore
                      to: .gitignore
                - id: install
                  run: npm install
                - id: build
                  run: npm run build
            # Artifact lives under `/app/.next`; narrow the default workspace output.
            outputPath: /app/.next

    api:
        path: ./apps/api
        build:
            baseImage: php:8.3-cli-bookworm
            dependencies:
                - composer
            steps:
                - id: scaffold-composer-json
                  copy:
                      from: api/composer.json
                      to: composer.json
                - id: scaffold-front-controller
                  copy:
                      from: api/public/index.php
                      to: public/index.php
                - id: scaffold-console
                  copy:
                      from: api/bin/console
                      to: bin/console
                - id: scaffold-kernel
                  copy:
                      from: api/src/Kernel.php
                      to: src/Kernel.php
                - id: scaffold-entity-greeting
                  copy:
                      from: api/src/Entity/Greeting.php
                      to: src/Entity/Greeting.php
                - id: scaffold-bundles
                  copy:
                      from: api/config/bundles.php
                      to: config/bundles.php
                - id: scaffold-preload
                  copy:
                      from: api/config/preload.php
                      to: config/preload.php
                - id: scaffold-services
                  copy:
                      from: api/config/services.yaml
                      to: config/services.yaml
                - id: scaffold-framework
                  copy:
                      from: api/config/packages/framework.yaml
                      to: config/packages/framework.yaml
                - id: scaffold-api-platform
                  copy:
                      from: api/config/packages/api_platform.yaml
                      to: config/packages/api_platform.yaml
                - id: scaffold-doctrine
                  copy:
                      from: api/config/packages/doctrine.yaml
                      to: config/packages/doctrine.yaml
                - id: scaffold-routing
                  copy:
                      from: api/config/packages/routing.yaml
                      to: config/packages/routing.yaml
                - id: scaffold-routes-api
                  copy:
                      from: api/config/routes/api_platform.yaml
                      to: config/routes/api_platform.yaml
                - id: scaffold-env
                  copy:
                      from: api/.env
                      to: .env
                - id: scaffold-gitignore
                  copy:
                      from: api/.gitignore
                      to: .gitignore
                - id: install
                  run: composer install --no-interaction --prefer-dist --no-progress
                - id: warmup
                  run: php bin/console cache:warmup --env=prod
            outputPath: /app

# ---------------------------------------------------------------------------
# environments — develop (Docker) + cloud topology (EC2 + Postgres).
#
# Develop services are keyed by service key (also used as the Docker
# network alias). `codebaseId` binds a service to a codebase — when set,
# the launcher mounts the codebase root at `/app` rw and sets the
# container working directory to `/app`. Ports use the `"host:container"`
# form (bare integer `n` is shorthand for `"n:n"`). `dependsOn` waits
# until the dependency's TCP readiness probe succeeds before starting a
# service.
# ---------------------------------------------------------------------------
environments:
    develop:
        type: docker
        services:
            db:
                image: postgres:16
                ports:
                    - "5432:5432"
                readiness:
                    port: 5432
                mounts:
                    # Postgres data volume — kept outside ./apps so it never
                    # overlaps a codebase path.
                    - source: ./data/postgres
                      target: /var/lib/postgresql/data
                environment:
                    - name: POSTGRES_USER
                      value: "{{ options.databaseUser }}"
                    - name: POSTGRES_PASSWORD
                      value: "{{ options.databasePassword }}"
                    - name: POSTGRES_DB
                      value: "{{ options.databaseName }}"

            api:
                codebaseId: api
                image: php:8.3-cli-bookworm
                ports:
                    - "8000:8000"
                dependsOn:
                    - db
                entrypoint: "php -S 0.0.0.0:8000 -t public"
                environment:
                    - name: APP_ENV
                      value: dev
                    - name: APP_NAME
                      value: "{{ options.projectSlug }}"
                    - name: DATABASE_URL
                      value: "postgresql://{{ options.databaseUser }}:{{ options.databasePassword }}@db:5432/{{ options.databaseName }}?serverVersion=16&charset=utf8"

            web:
                codebaseId: web
                image: node:20-bookworm
                ports:
                    - "3000:3000"
                # Explicit on both `api` and `db` even though `api` already
                # waits on `db` — keeps `web`'s dependencies self-documenting
                # and guarantees readiness order if the graph is ever edited.
                dependsOn:
                    - api
                    - db
                command: "npm install"
                entrypoint: "npm run dev"
                environment:
                    - name: NODE_ENV
                      value: development
                    # The web app only talks to the API over HTTP — it does
                    # NOT hold DATABASE_URL. Postgres is shared via the API.
                    - name: NEXT_PUBLIC_API_URL
                      value: http://localhost:8000
                    - name: APP_NAME
                      value: "{{ options.projectSlug }}"

    cloud:
        slots:
            # Non-hosting slot: Postgres. Exposes `connectionString` output
            # consumed by the api hosting slot. No codebaseId, no env.
            primary-db:
                type: database
                allowed:
                    - aws::database::postgres

            # API host — EC2 single-instance. Attaches to the database so
            # deploy order is primary-db → api-host. DATABASE_URL is the
            # env var the user explicitly asked for.
            api-host:
                type: hosting
                codebaseId: api
                allowed:
                    - aws::hosting::ec2-single
                attachesTo:
                    - primary-db
                env:
                    - name: APP_ENV
                      value: prod
                    - name: APP_NAME
                      value: "{{ options.projectSlug }}"
                    - name: DATABASE_URL
                      from:
                          slot: primary-db
                          output: connectionString
                    - name: APP_SECRET
                      fromSecret: api_app_secret

            # Web host — EC2 single-instance. Attaches to the API so the
            # public URL resolves after the API is up. Web never sees
            # DATABASE_URL; only NEXT_PUBLIC_API_URL.
            web-host:
                type: hosting
                codebaseId: web
                allowed:
                    - aws::hosting::ec2-single
                attachesTo:
                    - api-host
                env:
                    - name: NODE_ENV
                      value: production
                    - name: APP_NAME
                      value: "{{ options.projectSlug }}"
                    - name: NEXT_PUBLIC_API_URL
                      from:
                          slot: api-host
                          output: url

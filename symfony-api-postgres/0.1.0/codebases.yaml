# ---------------------------------------------------------------------------
# codebases — two: a Next.js frontend (web) and a Symfony API (api).
#
# `copy.from` is relative to the template's `resources/` directory (no
# `resources/` prefix). `copy.to` is relative to the container workspace
# root (default `/app`). `workingPath` / `outputPath` default to `/app`;
# both are set here to make the Docker-backed build contract explicit.
# ---------------------------------------------------------------------------
codebases:
  api:
    path: ./apps/api
    build:
      baseImage: php:8.3-cli-bookworm
      dependencies:
        - composer
      steps:
        - id: scaffold-symfony-skeleton
          run: composer create-project symfony/skeleton . --no-interaction --no-progress
        - id: scaffold-gitignore
          copy:
            from: api/.gitignore
            to: .gitignore
        - id: require-dependencies
          run: composer require api-platform/symfony:^4.0 api-platform/doctrine-orm:^4.0 doctrine/dbal:^3.8 doctrine/doctrine-bundle:^2.12 doctrine/orm:^3.0 symfony/validator symfony/serializer --no-interaction --no-progress
        - id: require-dev-dependencies
          run: composer require --dev symfony/maker-bundle --no-interaction --no-progress
        - id: install
          run: composer install --no-interaction --prefer-dist --no-progress
      workingPath: /app
      outputPath: /app

environments:
  develop:
    type: docker
    services:
      db:
        image: postgres:16
        ports:
          db:
            container: 5432
            host: auto
        mounts:
          # Postgres data volume — kept outside ./apps so it never
          # overlaps a codebase path.
          - source: ./data/postgres
            target: /var/lib/postgresql/data
        environment:
          - name: POSTGRES_USER
            value: "{{ options.databaseUser }}"
          - name: POSTGRES_PASSWORD
            value: "{{ options.databasePassword }}"
          - name: POSTGRES_DB
            value: "{{ options.databaseName }}"

      api:
        codebaseId: api
        image: partrocks/symfony-api-postgres-api:dev
        imageBuild:
          dockerfile: docker/api/Dockerfile
        ports:
          http:
            container: 8000
            host: auto
        dependsOn:
          - db
        entrypoint: "php -S 0.0.0.0:{{ services.api.ports.http.container }} -t public"
        environment:
          - name: APP_ENV
            value: dev
          - name: APP_NAME
            value: "{{ app.name }}"
          - name: DATABASE_URL
            value: "postgresql://{{ options.databaseUser }}:{{ options.databasePassword }}@{{ services.db.hostname }}:{{ services.db.ports.db.container }}/{{ options.databaseName }}?serverVersion=16&charset=utf8"
        actions:
          clear-cache:
            label: Clear Symfony cache
            run: "php bin/console cache:clear"

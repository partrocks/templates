# ---------------------------------------------------------------------------
# Options — caller-tunable knobs. Only {{ options.* }} substitution is
# supported anywhere in this file. Application display name / slug come from
# {{ app.name }} / {{ app.slug }} (provided by the runtime).
# ---------------------------------------------------------------------------
options:
  databaseName:
    id: databaseName
    label: Postgres database name
    type: string
    required: false
    default: app

  databaseUser:
    id: databaseUser
    label: Postgres user (develop only)
    type: string
    required: false
    default: app

  databasePassword:
    id: databasePassword
    label: Postgres password (develop only)
    type: string
    required: false
    default: app

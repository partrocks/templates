# ---------------------------------------------------------------------------
# Options — caller-tunable knobs. `{{ options.* }}` refers to resolved values below.
# String defaults may use `{{ app.name }}`, `{{ app.slug }}`, earlier options,
# `manifest.*`, or develop `services.*` — substituted when the template instance is created.
# ---------------------------------------------------------------------------
options:
  databaseName:
    id: databaseName
    label: Postgres database name
    type: string
    required: false
    default: "{{ app.slug }}"

  databaseUser:
    id: databaseUser
    label: Postgres user (develop only)
    type: string
    required: false
    default: "{{ app.slug }}"

  databasePassword:
    id: databasePassword
    label: Postgres password (develop only)
    type: string
    required: false
    default: "{{ app.slug }}"
